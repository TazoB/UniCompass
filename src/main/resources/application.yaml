spring:
  application:
    name: uniCompass
  datasource:
    url: ${URL}
    username: ${USER}
    password: ${PASS}
    driver-class-name: org.postgresql.Driver
  output:
    ansi:
      enabled: ALWAYS
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: unicompass.team@gmail.com
    password: ${EMAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
logging:
  level:
    org.hibernate.SQL: debug
mail:
  host: smtp.gmail.com
  port: 587
  username: unicompass.team@gmail.com
  password: ${EMAIL_PASS}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true