spring:
  application:
    name: uniCompass
  datasource:
    url: ${URL}
    username: ${USER}
    password: ${PASS}
    driver-class-name: org.postgresql.Driver
  output:
    ansi:
      enabled: ALWAYS
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    org.hibernate.SQL: debug
mail:
  host: smtp.gmail.com
  port: 587
  username: hello.unicompass@gmail.com
  password: your_16_digit_app_password # Replace with your generated App Password
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true