<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniCompass - Sign Up</title>
    <link rel="stylesheet" href="signup.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
<header class="top-nav">
    <div class="logo">
        <i data-lucide="brain-circuit" class="logo-icon"></i>
        <h2>UniCompass</h2>
    </div>
    <div class="nav-actions">
        <button class="btn-outline" onclick="window.location.href='login.html'">Log In</button>
    </div>
</header>

<div class="signup-container">
    <div class="signup-card">

        <div class="card-header">
            <h2>Start your journey</h2>
            <p>Create an account to explore more universities and features.</p>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <form id="signup-form">

            <div class="form-step active" id="step-1">
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <div class="input-with-icon">
                        <i data-lucide="user" class="input-icon"></i>
                        <input type="text" id="reg-fullname" placeholder="Alex Johnson" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Username <span class="required">*</span></label>
                    <div class="input-with-icon">
                        <i data-lucide="at-sign" class="input-icon"></i>
                        <input type="text" id="reg-username" placeholder="alex_j" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <div class="input-with-icon">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" id="reg-email" placeholder="alex@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <div class="input-with-icon">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" id="reg-password" placeholder="Create a strong password" required>
                    </div>
                </div>

                <button type="button" class="btn-primary w-100" id="btn-next-1">
                    Continue <i data-lucide="arrow-right" class="icon-sm" style="margin-left: 5px;"></i>
                </button>

                <div class="login-link">
                    Already have an account? <a href="login.html">Log in</a>
                </div>
            </div>

            <div class="form-step" id="step-2">
                <div class="form-row">
                    <div class="form-group half-width">
                        <label>Preferred Country</label>
                        <input type="text" id="reg-country" placeholder="e.g. USA (Optional)">
                    </div>
                    <div class="form-group half-width">
                        <label>Preferred City</label>
                        <input type="text" id="reg-city" placeholder="e.g. Boston (Optional)">
                    </div>
                </div>

                <div class="form-group">
                    <label>State / Region</label>
                    <input type="text" id="reg-state" placeholder="e.g. MA (Optional)">
                </div>

                <div class="form-group">
                    <div class="budget-header">
                        <label>Approximate Budget <span class="required">*</span></label>
                        <span class="budget-value">$<span id="display-budget">15,000</span></span>
                    </div>
                    <input type="range" class="custom-slider" id="reg-budget" min="0" max="150000" step="1000"
                           value="15000">
                </div>

                <div class="form-group">
                    <label>Point of Interest</label>
                    <select id="reg-poi" class="custom-select">
                        <option value="" disabled selected>Select your primary interest...</option>
                        <option value="Languages & Literature">Languages & Literature</option>
                        <option value="History & Philosophy">History & Philosophy</option>
                        <option value="Visual & Performing Arts">Visual & Performing Arts</option>
                        <option value="Cultural Studies">Cultural Studies</option>
                        <option value="Life Sciences">Life Sciences</option>
                        <option value="Physical Sciences">Physical Sciences</option>
                        <option value="Mathematical & Statistical">Mathematical & Statistical</option>
                        <option value="Core Engineering">Core Engineering</option>
                        <option value="Computing">Computing</option>
                        <option value="Specialized Tech">Specialized Tech</option>
                        <option value="Behavioral Sciences">Behavioral Sciences</option>
                        <option value="Politics & Law">Politics & Law</option>
                        <option value="Economics & Geography">Economics & Geography</option>
                        <option value="Finance & Accounting">Finance & Accounting</option>
                        <option value="Commerce & Marketing">Commerce & Marketing</option>
                        <option value="Leadership">Leadership</option>
                        <option value="Clinical Medicine">Clinical Medicine</option>
                        <option value="Public Health">Public Health</option>
                        <option value="Biomedical">Biomedical</option>
                    </select>
                </div>

                <div class="button-group">
                    <button type="button" class="btn-secondary" id="btn-back-1">Back</button>
                    <button type="button" class="btn-primary" id="btn-next-2">Continue</button>
                </div>
            </div>

            <div class="form-step" id="step-3">

                <div class="form-row">
                    <div class="form-group half-width">
                        <label>GPA <span class="required">*</span></label>
                        <input type="number" id="reg-gpa" max="4.0" min="0" step="0.1" placeholder="4.0" required>
                    </div>
                    <div class="form-group half-width">
                        <label>SAT (Optional)</label>
                        <input type="number" id="reg-sat" max="1600" min="400" step="10" placeholder="e.g. 1450">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group half-width">
                        <label>TOEFL (Optional)</label>
                        <input type="number" id="reg-toefl" max="120" min="0" placeholder="e.g. 105">
                    </div>
                    <div class="form-group half-width">
                        <label>IELTS (Optional)</label>
                        <input type="number" id="reg-ielts" max="9.0" min="0" step="0.5" placeholder="e.g. 7.5">
                    </div>
                </div>

                <div class="form-group">
                    <label>Languages</label>
                    <input type="text" id="reg-languages" placeholder="e.g. English (Native), German (B2)">
                </div>

                <div class="form-group">
                    <label>Skills</label>
                    <input type="text" id="reg-skills" placeholder="e.g. Python, Public Speaking, React">
                </div>

                <div class="form-group">
                    <label>Extracurricular Activities</label>
                    <textarea id="reg-extras" rows="3"
                              placeholder="Briefly list your main activities, clubs, or volunteer work..."
                              style="resize: none;"></textarea>
                </div>

                <div class="button-group">
                    <button type="button" class="btn-secondary" id="btn-back-2">Back</button>
                    <button type="button" class="btn-primary" id="btn-submit">Create Account</button>
                </div>
            </div>

        </form>
    </div>
</div>

<script src="signup.js"></script>
</body>

</html>
